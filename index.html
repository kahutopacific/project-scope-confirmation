<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kahuto Pacific — Project Agreement, AOI Verification & Mobilisation Authorisation</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230e4a3a'/><text x='50%25' y='55%25' font-size='18' text-anchor='middle' dominant-baseline='middle' fill='%23d4a853' font-weight='bold'>K</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Fraunces:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --g:#0e4a3a;--gl:#1a6b54;--gxl:#e8f0ed;
      --gold:#d4a853;--gold-l:#faf3e0;
      --bg:#f4f5f4;--white:#fff;
      --tx:#1a1f1e;--tx-s:#4a5654;--tx-xs:#8a9593;
      --bd:#dfe4e2;--bd-l:#eef1ef;
      --r:10px;--rl:14px;
      --sh:0 1px 3px rgba(14,74,58,.06);--shm:0 4px 16px rgba(14,74,58,.08);
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;line-height:1.5}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#c5cac8;border-radius:3px}
    button,input,select,textarea{font-family:inherit}
    button{cursor:pointer;border:none;-webkit-tap-highlight-color:transparent}

    .hdr{background:linear-gradient(145deg,#082e24,var(--g) 40%,var(--gl));position:relative;overflow:hidden}
    .hdr::before{content:'';position:absolute;top:-40%;right:-15%;width:400px;height:400px;background:radial-gradient(circle,rgba(212,168,83,.1),transparent 70%);pointer-events:none}
    .hdr-in{max-width:820px;margin:0 auto;padding:28px 24px 20px;position:relative;z-index:1}
    .brand{font-size:10px;letter-spacing:4px;color:var(--gold);font-weight:700;text-transform:uppercase}
    .hdr h1{font-family:'Fraunces',serif;font-weight:800;font-size:22px;color:#fff;margin:6px 0 0;letter-spacing:-.5px;line-height:1.3}
    .hdr-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px}
    .gold-rule{height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin-top:16px;border-radius:1px}

    .tabs{background:var(--white);border-bottom:1px solid var(--bd);padding:0 24px;overflow-x:auto}
    .tabs-in{max-width:820px;margin:0 auto;display:flex}
    .tab{padding:13px 14px;background:none;color:var(--tx-xs);font-weight:500;font-size:11px;white-space:nowrap;border-bottom:2.5px solid transparent;transition:.2s}
    .tab:hover{color:var(--tx-s)}.tab.on{color:var(--g);font-weight:700;border-bottom-color:var(--g)}
    .tab .n{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;font-size:10px;font-weight:700;margin-right:5px;background:var(--bd-l);color:var(--tx-xs);transition:.2s}
    .tab.on .n{background:var(--g);color:#fff}

    .wrap{max-width:820px;margin:0 auto;padding:20px 24px 120px}

    .card{background:var(--white);border:1px solid var(--bd);border-radius:var(--rl);padding:22px 26px;margin-bottom:16px;box-shadow:var(--sh)}
    .ct{font-size:15px;font-weight:700;color:var(--g);display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--bd-l)}
    .ct .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--gxl)}
    .ct .sn{font-family:'Fraunces',serif;font-weight:800;font-size:13px;color:var(--g);width:28px;height:28px;border-radius:50%;border:2px solid var(--g);display:flex;align-items:center;justify-content:center}

    .fr{display:flex;flex-wrap:wrap;gap:14px}
    .fd{flex:1 1 100%;min-width:0}.fd.h{flex:1 1 calc(50% - 7px);min-width:220px}.fd.t{flex:1 1 calc(33.33% - 10px);min-width:180px}
    .fl{display:block;font-size:11px;font-weight:600;color:var(--tx-s);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
    .fl .rq{color:#c53030;margin-left:2px}
    .fd input,.fd select,.fd textarea{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:14px;background:#fafbfb;color:var(--tx);outline:0;transition:.15s}
    .fd input:focus,.fd select:focus,.fd textarea:focus{border-color:var(--g);background:#fff;box-shadow:0 0 0 3px rgba(14,74,58,.08)}
    .fd textarea{resize:vertical;min-height:56px}.fd input::placeholder,.fd textarea::placeholder{color:#b5bfbc}

    .cg{display:flex;flex-wrap:wrap;gap:7px}
    .ch{padding:7px 15px;border-radius:8px;font-size:13px;font-weight:500;border:1.5px solid var(--bd);background:var(--white);color:var(--tx-s);transition:.15s;user-select:none}
    .ch:hover{border-color:#b8cdc5;background:#f8fbfa}
    .ch.on{border-color:var(--g);background:var(--gxl);color:var(--g);font-weight:600}
    .ch.on::before{content:'✓ ';font-weight:700}

    .pr{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd-l);gap:12px;flex-wrap:wrap}
    .pr:last-of-type{border-bottom:none}
    .pr-l{font-size:13px;color:var(--tx);flex:1 1 200px}
    .pr-bs{display:flex;gap:5px}
    .pb{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;border:1.5px solid var(--bd);background:var(--white);color:var(--tx-xs);transition:.15s}
    .pb.yes{border:none;background:var(--g);color:#fff}
    .pb.na{border:none;background:#6b7c78;color:#fff}
    .pb.out{border:none;background:#b7791f;color:#fff}

    .sl{font-size:11px;font-weight:700;color:var(--tx-xs);text-transform:uppercase;letter-spacing:.7px;margin:0 0 8px}
    .hint{font-size:13px;color:var(--tx-s);margin-bottom:14px;line-height:1.6}
    .hint b{color:var(--tx)}

    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:var(--r);font-size:14px;font-weight:600;transition:.15s}
    .btn-p{background:var(--g);color:#fff}.btn-p:hover{background:#0b3d30;box-shadow:var(--shm)}
    .btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#c09930}
    .btn-o{background:var(--white);color:var(--g);border:1.5px solid var(--g)}.btn-o:hover{background:var(--gxl)}
    .btn-gh{background:transparent;color:var(--tx-s);border:1.5px solid var(--bd)}.btn-gh:hover{background:#f0f2f1}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-lg{padding:14px 28px;font-size:15px;font-weight:700;border-radius:12px}

    .fnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--bd);padding:12px 24px;z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.04)}
    .fnav-in{max-width:820px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}

    .ib{padding:14px 18px;border-radius:var(--r);font-size:13px;line-height:1.6}
    .ib.gr{background:#edf5f1;border:1px solid #c8ddd3;color:var(--g)}
    .ib.warn{background:#fefbeb;border:1px solid #e8d9a0;color:#92710c}

    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:100;box-shadow:0 8px 32px rgba(14,74,58,.15);animation:fu .3s}
    .toast.ok{background:var(--g);color:#fff}.toast.err{background:#c53030;color:#fff}
    @keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    .scope-row{display:flex;gap:8px;align-items:start;margin-bottom:8px}

    .deliv-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);border:1.5px solid var(--g);background:var(--gxl);margin-bottom:6px;flex-wrap:wrap}
    .deliv-row .deliv-name{font-size:13px;font-weight:600;color:var(--g);flex:1 1 200px;min-width:180px}
    .deliv-row .deliv-name::before{content:'✓ ';font-weight:700}
    .deliv-row select{padding:6px 10px;border:1.5px solid #c8ddd3;border-radius:6px;font-size:12px;background:#fff;color:var(--tx);outline:0;min-width:160px}
    .deliv-row select:focus{border-color:var(--g);box-shadow:0 0 0 2px rgba(14,74,58,.1)}
    .deliv-row .deliv-remove{background:none;border:none;color:var(--tx-xs);font-size:14px;padding:2px 6px;border-radius:4px;cursor:pointer}
    .deliv-row .deliv-remove:hover{color:#c53030;background:rgba(197,48,48,.06)}
    .scope-row .fd{flex:1}
    .scope-del{padding:8px 10px;border-radius:var(--r);background:none;border:1.5px solid var(--bd);color:var(--tx-xs);font-size:14px;margin-top:22px;transition:.15s}
    .scope-del:hover{border-color:#c53030;color:#c53030;background:rgba(197,48,48,.04)}

    .sched-table{width:100%;border-collapse:collapse;font-size:13px}
    .sched-table th{text-align:left;padding:8px 10px;background:var(--gxl);color:var(--g);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--g)}
    .sched-table td{padding:4px 4px;border-bottom:1px solid var(--bd-l)}
    .sched-table td input{padding:7px 10px;font-size:12px}
    .sched-table .item-no{font-family:monospace;font-weight:700;color:var(--g);font-size:13px;width:36px;text-align:center}

    .map-wrap{position:relative;height:420px;border-radius:var(--r);overflow:hidden;border:1.5px solid var(--bd);margin:12px 0}
    .map-wrap .leaflet-container{height:100%;width:100%;z-index:1}
    .map-stats{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
    .map-stat{padding:8px 16px;background:var(--gxl);border-radius:8px;font-size:12px;color:var(--g);font-weight:600}
    .map-stat b{font-family:monospace;font-size:15px;margin-right:4px}
    .leaflet-draw-toolbar a,.leaflet-bar a{background-color:#fff !important;border-color:var(--bd) !important;color:var(--g) !important}
    .leaflet-draw-toolbar a:hover,.leaflet-bar a:hover{background-color:var(--gxl) !important}

    .sig-block{flex:1;min-width:280px;padding:20px;background:#fafbfb;border:1.5px solid var(--bd);border-radius:var(--rl)}
    .sig-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx-xs);margin-bottom:14px}
    .sig-blank{text-align:center;padding:30px 16px;color:var(--tx-xs);border:2px dashed var(--bd);border-radius:var(--r)}

    /* ── Costing ── */
    .cost-svc{padding:16px 18px;border:1.5px solid var(--bd);border-radius:var(--rl);margin-bottom:10px;background:#fafbfb;transition:.2s}
    .cost-svc.active{border-color:var(--g);background:var(--gxl)}
    .cost-svc-hdr{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
    .cost-svc-hdr .cost-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:transparent;transition:.15s;flex-shrink:0;background:var(--white)}
    .cost-svc.active .cost-check{border-color:var(--g);background:var(--g);color:#fff}
    .cost-svc-hdr .cost-name{font-size:14px;font-weight:600;color:var(--tx)}
    .cost-svc.active .cost-name{color:var(--g)}
    .cost-svc-hdr .cost-desc{font-size:11px;color:var(--tx-xs);margin-left:auto}
    .cost-body{margin-top:14px;padding-top:14px;border-top:1px solid var(--bd-l)}
    .cost-line{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:8px}
    .cost-line .fd{min-width:0}
    .cost-line .fd.desc{flex:2 1 200px}.cost-line .fd.qty{flex:0 0 80px;min-width:70px}.cost-line .fd.rate{flex:0 0 120px;min-width:100px}.cost-line .fd.amt{flex:0 0 130px;min-width:110px}
    .cost-line .fd input[readonly]{background:#e8f0ed;font-weight:700;color:var(--g)}
    .cost-total-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:linear-gradient(135deg,#082e24,var(--g));border-radius:var(--rl);color:#fff;margin-top:16px}
    .cost-total-bar .cost-total-label{font-size:13px;font-weight:600;opacity:.8}
    .cost-total-bar .cost-total-val{font-family:'Fraunces',serif;font-size:26px;font-weight:800;letter-spacing:-.5px}
    .cost-total-bar .cost-total-cur{font-size:13px;font-weight:600;opacity:.6;margin-left:6px}

    .mode-toggle{display:flex;gap:0;border:1.5px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:4px}
    .mode-toggle button{padding:6px 14px;font-size:11px;font-weight:600;background:var(--white);color:var(--tx-xs);border:none;transition:.15s}
    .mode-toggle button.on{background:var(--g);color:#fff}

    @media(max-width:640px){
      .hdr-in{padding:22px 18px 16px}.hdr h1{font-size:18px}
      .wrap{padding:16px 16px 120px}.card{padding:18px 18px}
      .fd.h,.fd.t{flex:1 1 100%;min-width:0}.tab{padding:12px 6px;font-size:10px}
      .tab .n{width:17px;height:17px;font-size:9px;margin-right:3px}
      .map-wrap{height:300px}
      .sig-block{min-width:100%}
      .cost-line .fd.desc,.cost-line .fd.qty,.cost-line .fd.rate,.cost-line .fd.amt{flex:1 1 100%}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

  <script type="text/babel">
    const{useState,useEffect,useRef,useCallback,useMemo}=React;

    // ═══════════════════════════════════════
    //  FORM OPTIONS
    // ═══════════════════════════════════════
    const STEPS=["Project Info","Project Costing","Scope of Services","AOI Verification","Pre-Mobilisation","Schedule","Variations","Acknowledgement","Authorisation & Export"];

    const SERVICE_LINES=[
      {id:'utility',name:'Utility Mapping (GPR / EMI)',desc:'Subsurface utility detection & mapping'},
      {id:'lidar',name:'Aerial LiDAR Survey',desc:'Airborne laser scanning'},
      {id:'hydro',name:'Hydrographic Survey',desc:'Bathymetry & water body mapping'},
      {id:'photo',name:'Photogrammetry',desc:'Aerial imagery & orthomosaic'},
      {id:'moana',name:'Moana Data Service',desc:'Geospatial data platform access'},
      {id:'custom',name:'Custom Service',desc:'Specify below'},
    ];

    const CURRENCIES=[
      {code:'FJD',symbol:'$',name:'Fijian Dollar'},
      {code:'USD',symbol:'US$',name:'US Dollar'},
      {code:'AUD',symbol:'A$',name:'Australian Dollar'},
    ];

    const SURVEY_TYPES=["Topographic Survey","Subsurface Utility Detection (GPR / EMI)","Terrestrial Laser Scanning","UAV LiDAR","Photogrammetry","Control Survey","Asset Mapping"];

    const DELIV_FORMATS={
      "CAD Drawing":["DWG","DXF"],
      "GIS Package":["Shapefile (.shp)","GeoPackage (.gpkg)","Geodatabase (.gdb)","MapInfo TAB"],
      "PDF Plans":["PDF"],
      "2D Orthomosaic":["GeoTIFF","GeoJPEG","JPEG2000","ECW","KML"],
      "Digital Terrain Model (DTM)":["GeoTIFF","ASCII Grid (.asc)","LAS","LAZ"],
      "Digital Surface Model (DSM)":["GeoTIFF","ASCII Grid (.asc)","LAS","LAZ"],
      "TIN Model":["DWG","LandXML (.xml)"],
      "Classified Point Cloud":["LAS","LAZ","E57"],
      "Contours":["DWG","DXF","Shapefile","GeoPackage","KML","PDF"],
      "Canopy Height Model":["GeoTIFF","ASCII Grid"],
      "Utility Attribute Table":["CSV","XLSX","Shapefile","GeoPackage"],
      "QA/QC Report":["PDF"],
      "Survey Report":["PDF"],
      "Metadata File":["XML","PDF"],
      "Aerial Base Map":["GeoTIFF","GeoJPEG","ECW","KML"],
      "Registered Scan Data":["RCP","LAS","E57"],
      "Cross Sections":["DWG","DXF","PDF"],
      "Bathymetry Surface":["GeoTIFF","ASCII Grid","XYZ"],
    };
    const DELIVERABLES=Object.keys(DELIV_FORMATS);

    const PRE_MOB=["Latest asset plans","Utility authority drawings","As-built drawings","Previous survey data","Control point data","Design drawings","Traffic Management Plan (road-based surveys only — client to arrange with LTA; provide approved closure windows to Kahuto prior to mobilisation)","Access approvals / landowner consent","Site induction documentation","Safety requirements specific to site"];

    const VARIATIONS=["Expansion of AOI boundary","Additional site days","Additional processing","Potholing / intrusive verification","Re-mobilisation","Additional deliverables","Re-processing due to design change","Delay exceeding agreed mobilisation window","Authority-imposed additional requirements"];

    const ACK_ITEMS=["The confirmed scope is limited to items listed in this document.","Works outside the confirmed scope will be treated as Variations.","Utility detection is subject to limitations where asset plans are incomplete.","Weather and site conditions may impact field operations.","This document forms the agreed operational scope of works."];

    const SCHED_ROWS=[
      {item:"0",task:"Contract Activation",desc:"Scope confirmation & approval",dur:"0 Days"},
      {item:"1",task:"Pre-Site Administration",desc:"Permits, authority notifications, TMP",dur:""},
      {item:"2",task:"Field Works",desc:"Site survey / detection / scanning",dur:""},
      {item:"3",task:"Data Processing & QA/QC",desc:"Processing and internal review",dur:""},
      {item:"4",task:"Delivery",desc:"Submission of deliverables",dur:"0 Days"},
    ];

    const PRESET_LOCS=[
      {n:'Suva',la:-18.1416,ln:178.4419,z:13},{n:'Nadi',la:-17.7765,ln:177.95,z:13},
      {n:'Nausori',la:-18.0194,ln:178.525,z:14},{n:'Lautoka',la:-17.6161,ln:177.4509,z:14},
      {n:'Labasa',la:-16.4267,ln:179.364,z:14},{n:'Honiara',la:-9.4295,ln:159.9729,z:13},
    ];

    // ═══════════════════════════════════════
    //  GEO HELPERS
    // ═══════════════════════════════════════
    function calcPolyArea(coords){if(coords.length<3)return 0;const R=6371000,r=Math.PI/180;let a=0;for(let i=0;i<coords.length;i++){const j=(i+1)%coords.length;a+=coords[i][1]*r*R*Math.cos(coords[i][0]*r)*(coords[j][0]*r*R)-(coords[j][1]*r*R*Math.cos(coords[j][0]*r))*(coords[i][0]*r*R);}return Math.abs(a)/2;}
    function fmtArea(m2){const ha=m2/10000;return ha<0.01?m2.toFixed(0)+' m²':ha.toFixed(2)+' ha';}
    function calcLen(coords){let d=0;for(let i=1;i<coords.length;i++){const R=6371000,r=Math.PI/180,dLat=(coords[i][0]-coords[i-1][0])*r,dLng=(coords[i][1]-coords[i-1][1])*r,a=Math.sin(dLat/2)**2+Math.cos(coords[i-1][0]*r)*Math.cos(coords[i][0]*r)*Math.sin(dLng/2)**2;d+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}return d;}
    function fmtLen(m){return m<1000?m.toFixed(0)+' m':(m/1000).toFixed(2)+' km';}

    // ═══════════════════════════════════════
    //  KML PARSE / EXPORT
    // ═══════════════════════════════════════
    function parseKML(text){
      const doc=new DOMParser().parseFromString(text,'text/xml');
      if(doc.querySelector('parsererror'))return null;
      const shapes=[];
      doc.querySelectorAll('Placemark').forEach(pm=>{
        const nameEl=pm.querySelector('name');const name=nameEl?nameEl.textContent:'';
        const pg=pm.querySelector('Polygon outerBoundaryIs LinearRing coordinates');
        if(pg){const coords=pg.textContent.trim().split(/\s+/).map(c=>{const p=c.split(',');return p.length>=2?[+p[1],+p[0]]:null}).filter(Boolean);if(coords.length>=3){if(coords[0][0]===coords[coords.length-1][0]&&coords[0][1]===coords[coords.length-1][1])coords.pop();shapes.push({type:'polygon',name,coords});}}
        const ln=pm.querySelector('LineString coordinates');
        if(ln){const coords=ln.textContent.trim().split(/\s+/).map(c=>{const p=c.split(',');return p.length>=2?[+p[1],+p[0]]:null}).filter(Boolean);if(coords.length>=2)shapes.push({type:'polyline',name,coords});}
        const pt=pm.querySelector('Point coordinates');
        if(pt){const p=pt.textContent.trim().split(',');if(p.length>=2)shapes.push({type:'marker',name,coords:[[+p[1],+p[0]]]});}
      });
      const docName=doc.querySelector('Document > name');
      return{name:docName?docName.textContent:'',shapes};
    }

    function exportKML(shapes,projectName){
      const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const N=String.fromCharCode(60)+'name'+String.fromCharCode(62);
      const NC=String.fromCharCode(60)+'/name'+String.fromCharCode(62);
      const pms=shapes.map((s,i)=>{
        let geo='';const nm=s.name||(s.type==='polygon'?'Area ':'Line ')+(i+1);
        if(s.type==='polygon'){const cs=s.coords.map(c=>c[1].toFixed(8)+','+c[0].toFixed(8)+',0').join(' ')+' '+s.coords[0][1].toFixed(8)+','+s.coords[0][0].toFixed(8)+',0';geo='<Polygon><outerBoundaryIs><LinearRing><coordinates>'+cs+'</coordinates></LinearRing></outerBoundaryIs></Polygon>';}

    function ServiceCostBlock({svc,data,currency,onToggle,onUpdate}){
      const isActive=data.active;
      const lines=data.lines||[];

      const updateLine=(idx,newLine)=>{
        const nl=[...lines];nl[idx]=newLine;onUpdate({...data,lines:nl});
      };
      const addLine=()=>onUpdate({...data,lines:[...lines,{description:'',mode:lines[0]?.mode||'lumpsum',qty:'',rate:'',amount:''}]});
      const removeLine=idx=>onUpdate({...data,lines:lines.filter((_,i)=>i!==idx)});

      return <div className={"cost-svc"+(isActive?' active':'')}>
        <div className="cost-svc-hdr" onClick={onToggle}>
          <div className="cost-check">{isActive?'✓':''}</div>
          <div>
            <div className="cost-name">{svc.name}</div>

          </div>
        </div>
        {isActive&&<div className="cost-body">
          {svc.id==='custom'&&<div style={{marginBottom:12}}>
            <Fd label="Custom Service Name" value={data.customName||''} onChange={v=>onUpdate({...data,customName:v})} placeholder="Enter service name..."/>
          </div>}
          {lines.map((line,i)=><CostingLine key={i} line={{...line,_first:i===0}} currency={currency}
            onChange={nl=>updateLine(i,nl)}

        </div>}
      </div>;
    }

    // ═══════════════════════════════════════
    //  MAP COMPONENT
    // ═══════════════════════════════════════
    function SurveyMap({shapes,onShapesChange}){
      const mapRef=useRef(null);const mapInst=useRef(null);const fgRef=useRef(null);const fileRef=useRef(null);

      useEffect(()=>{
        if(mapInst.current)return;
        const map=L.map(mapRef.current,{center:[-18.1416,178.4419],zoom:13,zoomControl:true});
        const esriSat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19});
        const esriLabels=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,opacity:0.75});
        const esriGroup=L.layerGroup([esriSat,esriLabels]);
        const googleHybrid=L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{attribution:'© Google',maxZoom:21});
        const osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19});
        esriGroup.addTo(map);
        L.control.layers({'Esri Satellite':esriGroup,'Google Hybrid':googleHybrid,'Street Map':osm},null,{position:'topright'}).addTo(map);

        const fg=new L.FeatureGroup();map.addLayer(fg);fgRef.current=fg;
        const dc=new L.Control.Draw({position:'topleft',draw:{polygon:{allowIntersection:false,shapeOptions:{color:'#0e4a3a',weight:2,fillColor:'#0e4a3a',fillOpacity:0.15}},polyline:{shapeOptions:{color:'#d4a853',weight:3}},rectangle:{shapeOptions:{color:'#1a6b54',weight:2,fillColor:'#1a6b54',fillOpacity:0.15}},circle:false,marker:true,circlemarker:false},edit:{featureGroup:fg,remove:true}});
        map.addControl(dc);

        const sync=()=>{const ns=[];fg.eachLayer(l=>{if(l instanceof L.Polygon){const lls=l.getLatLngs();const flat=Array.isArray(lls[0])?lls[0]:lls;ns.push({type:'polygon',name:'',coords:flat.map(c=>[c.lat,c.lng])});}else if(l instanceof L.Polyline){ns.push({type:'polyline',name:'',coords:l.getLatLngs().map(c=>[c.lat,c.lng])});}else if(l instanceof L.Marker){const ll=l.getLatLng();ns.push({type:'marker',name:'',coords:[[ll.lat,ll.lng]]});}});onShapesChange(ns);};

        map.on(L.Draw.Event.CREATED,e=>{fg.addLayer(e.layer);sync();});
        map.on(L.Draw.Event.DELETED,()=>sync());
        map.on(L.Draw.Event.EDITED,()=>sync());

        if(shapes&&shapes.length){shapes.forEach(s=>{if(s.type==='polygon')fg.addLayer(L.polygon(s.coords,{color:'#0e4a3a',weight:2,fillColor:'#0e4a3a',fillOpacity:0.15}));else if(s.type==='polyline')fg.addLayer(L.polyline(s.coords,{color:'#d4a853',weight:3}));else if(s.type==='marker')fg.addLayer(L.marker(s.coords[0]));});try{map.fitBounds(fg.getBounds().pad(0.2));}catch(e){}}
        mapInst.current=map;
      },[]);

      const handleImport=useCallback(e=>{
        const file=e.target.files[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=ev=>{const res=parseKML(ev.target.result);if(!res||!res.shapes.length){alert('No valid shapes found in KML');return;}const fg=fgRef.current;const map=mapInst.current;fg.clearLayers();
        res.shapes.forEach(s=>{if(s.type==='polygon')fg.addLayer(L.polygon(s.coords,{color:'#0e4a3a',weight:2,fillColor:'#0e4a3a',fillOpacity:0.15}));else if(s.type==='polyline')fg.addLayer(L.polyline(s.coords,{color:'#d4a853',weight:3}));else if(s.type==='marker')fg.addLayer(L.marker(s.coords[0]));});
        try{map.fitBounds(fg.getBounds().pad(0.2));}catch(e){}onShapesChange(res.shapes);};
        reader.readAsText(file);e.target.value='';
      },[onShapesChange]);

      const handleExport=useCallback(()=>{
        if(!shapes||!shapes.length){alert('No shapes to export');return;}
        const kml=exportKML(shapes,'Survey Area');
        const blob=new Blob([kml],{type:'application/vnd.google-earth.kml+xml'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='survey_area.kml';
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
      },[shapes]);

      const jumpTo=useCallback((lat,lng,z)=>{if(mapInst.current)mapInst.current.setView([lat,lng],z);},[]);

      let totalArea=0,totalLen=0,ct=(shapes||[]).length;
      (shapes||[]).forEach(s=>{if(s.type==='polygon')totalArea+=calcPolyArea(s.coords);if(s.type==='polyline')totalLen+=calcLen(s.coords);});

      return <div>
        <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
          <button type="button" className="btn btn-o" style={{fontSize:12,padding:'8px 14px'}} onClick={()=>fileRef.current.click()}>📂 Import KML</button>
          {ct>0&&<button type="button" className="btn btn-o" style={{fontSize:12,padding:'8px 14px'}} onClick={handleExport}>📥 Export KML</button>}
          <div style={{marginLeft:'auto',display:'flex',gap:4,flexWrap:'wrap'}}>{PRESET_LOCS.map(p=><button key={p.n} type="button" className="btn btn-gh" style={{fontSize:10,padding:'5px 9px'}} onClick={()=>jumpTo(p.la,p.ln,p.z)}>{p.n}</button>)}</div>
        </div>
        <input type="file" ref={fileRef} accept=".kml" style={{display:'none'}} onChange={handleImport}/>
        <div className="map-wrap"><div ref={mapRef} style={{height:'100%',width:'100%'}}/></div>
        <div className="map-stats">
          <div className="map-stat"><b>{ct}</b> shape{ct!==1?'s':''}</div>
          {totalArea>0&&<div className="map-stat"><b>{fmtArea(totalArea)}</b> area</div>}
          {totalLen>0&&<div className="map-stat"><b>{fmtLen(totalLen)}</b> length</div>}
        </div>
      </div>;
    }

        // 3: AOI Verification
        ()=><Card title="Area of Interest (AOI) Confirmation" sn="5">
          <p className="hint">The Client confirms that a KML/SHP defining the AOI has been provided, the boundary is final and accurate, and no works are required outside the confirmed boundary.</p>
          <div className="fr" style={{marginBottom:16}}>
            <Fd label="AOI File Name" value={f.aoiFileName} onChange={v=>s('aoiFileName',v)} placeholder="e.g. kings_road_survey_area.kml" half/>
            <Fd label="Date Received" value={f.aoiDateReceived} onChange={v=>s('aoiDateReceived',v)} type="date" half/>
          </div>
          <div className="sl" style={{marginTop:8}}>Survey Area Definer</div>
          <p className="hint">Import the agreed KML or draw the survey boundary directly. This area will be embedded in the PDF.</p>
          <SurveyMap shapes={f.shapes} onShapesChange={newShapes=>s('shapes',newShapes)}/>
          <div className="ib warn" style={{marginTop:14}}>
            <div style={{fontWeight:700,marginBottom:4}}>Important</div>
            <div style={{fontSize:12.5}}>• Any extension beyond the confirmed AOI will constitute a Variation.<br/>• Additional mobilisation or processing resulting from boundary change will be costed separately.</div>
          </div>
        </Card>,

        // 4: Pre-Mobilisation
        ()=><Card title="Client Pre-Mobilisation Requirements" sn="6">
          <p className="hint">Field works will not commence until the following are provided (where applicable). Set the status of each item.</p>
          {PRE_MOB.map(p=><PMRow key={p} label={p} status={f.preMobStatuses[p]} onChange={v=>s('preMobStatuses',{...f.preMobStatuses,[p]:v})}/>)}
          <div style={{marginTop:16}}>
            <Ta label="Outstanding Items / Notes" value={f.outstandingNotes} onChange={v=>s('outstandingNotes',v)} placeholder="Note any outstanding items or required actions..."/>
          </div>
          <div style={{marginTop:12,fontSize:12,color:'var(--tx-xs)',fontStyle:'italic'}}>
            The Client acknowledges that missing documentation may: affect schedule, reduce utility detection confidence levels, result in additional variation costs.
          </div>
        </Card>,

        // 5: Schedule
        ()=><Card title="Project Schedule (Agreed Program)" sn="7">
          <p className="hint">The following schedule forms part of the confirmed scope.</p>
          <table className="sched-table">
            <thead><tr><th>Item</th><th>Task</th><th>Description</th><th>Duration</th><th>Start Date</th><th>End Date</th></tr></thead>
            <tbody>
              {f.schedule.map((r,i)=><tr key={i}>
                <td className="item-no">{r.item}</td>
                <td style={{fontWeight:600,fontSize:13,padding:'6px 8px'}}>{r.task}</td>
                <td style={{fontSize:12,color:'var(--tx-s)',padding:'6px 8px'}}>{r.desc}</td>
                <td><input value={r.dur} onChange={e=>updateSched(i,'dur',e.target.value)} placeholder="e.g. 5 Days"/></td>
                <td><input type="date" value={r.start} onChange={e=>updateSched(i,'start',e.target.value)}/></td>
                <td><input type="date" value={r.end} onChange={e=>updateSched(i,'end',e.target.value)}/></td>
              </tr>)}
            </tbody>
          </table>
          <div className="ib gr" style={{marginTop:16,fontSize:12}}>
            <div style={{fontWeight:700,marginBottom:4}}>Schedule Conditions</div>
            • Subject to suitable weather conditions<br/>
            • Dependent on timely provision of required documentation<br/>
            • Dependent on access availability<br/>
            • Authority approvals may impact start date<br/><br/>
            <strong>Delays caused by Client-side dependencies</strong> may result in: extension of time, re-mobilisation charges, variation costs.<br/><br/>
            This schedule supersedes any previously issued indicative program unless otherwise agreed in writing.
          </div>
        </Card>,

        // 6: Variations
        ()=><Card title="Variation & Scope Change Protocol" sn="8">
          <p className="hint">The following will constitute a Variation:</p>
          <CG items={VARIATIONS} selected={f.variations} toggle={tog('variations')}/>
          <div className="ib gr" style={{marginTop:16,fontSize:12}}>
            <div style={{fontWeight:700,marginBottom:4}}>All Variations</div>
            • Will be issued in writing<br/>
            • Will state cost and time impact<br/>
            • Must be approved prior to commencement<br/><br/>
            <strong>No additional works will be undertaken without written approval.</strong>
          </div>
        </Card>,

        // 7: Acknowledgement
        ()=><Card title="Client Acknowledgement" sn="9">
          <p className="hint">The Client acknowledges that:</p>
          {ACK_ITEMS.map((a,i)=><div key={i} style={{padding:'10px 0',borderBottom:i<ACK_ITEMS.length-1?'1px solid var(--bd-l)':'none',fontSize:14,color:'var(--tx)'}}>{a}</div>)}
        </Card>,

        // 8: Authorisation & Export
        ()=><>
          <Card title="Authorisation to Proceed" sn="10">
            <div className="ib gr" style={{marginBottom:18}}>
              <div style={{fontWeight:700,marginBottom:4}}>I confirm that:</div>
              <div style={{fontSize:12.5}}>
                • The scope of works and project costing are accurate and agreed<br/>
                • The AOI boundary is confirmed<br/>
                • Required documentation has been provided or noted<br/>
                • The project schedule is accepted<br/>
                • Kahuto Pacific is authorised to proceed with mobilisation
              </div>
            </div>
            <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
              <div className="sig-block">
                <div className="sig-label">Kahuto Pacific Representative</div>
                <div className="fr">
                  <Fd label="Name" value={f.kahutoName} onChange={v=>s('kahutoName',v)} placeholder="Full name" required/>
                  <Fd label="Position" value={f.kahutoPosition} onChange={v=>s('kahutoPosition',v)} placeholder="e.g. Project Manager"/>
                  <Fd label="Date" value={f.kahutoDate} onChange={v=>s('kahutoDate',v)} type="date"/>
                </div>
              </div>
              <div className="sig-block">
                <div className="sig-label">Client</div>
                <div className="sig-blank">
                  <div style={{fontSize:28,marginBottom:6}}>✍️</div>
                  <div style={{fontSize:12}}>Client signature block will be left blank in the PDF for wet signature or digital signing (Adobe Sign / DocuSign).</div>
                </div>
              </div>
            </div>
          </Card>
          <Card title="Generate & Download" icon="📄">
            <div className="ib gr" style={{marginBottom:18}}>
              <div style={{fontWeight:700,marginBottom:4}}>Two-Stage Signing</div>
              <div style={{fontSize:12.5}}>
                <strong>1.</strong> Generate the PDF — Kahuto's details are filled in, client section left blank.<br/>
                <strong>2.</strong> Email the PDF to the client for wet signature or digital signing via Adobe Sign / DocuSign.<br/>
                <strong>3.</strong> Optionally attach the exported KML alongside the PDF.
              </div>
            </div>
            {grandTotal>0&&<div style={{padding:'14px 18px',background:'linear-gradient(135deg,#082e24,#0e4a3a)',borderRadius:'var(--rl)',color:'#fff',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,fontWeight:600,opacity:.8}}>Agreement Total</span>
              <span style={{fontFamily:'Fraunces, serif',fontSize:22,fontWeight:800}}>{curSym}{grandTotal.toLocaleString('en-US',{minimumFractionDigits:2})} <span style={{fontSize:12,fontWeight:500,opacity:.6}}>{f.currency}</span></span>
            </div>}
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <button type="button" className="btn btn-p btn-lg" onClick={handleDownload} style={{flex:1,justifyContent:'center'}}>📄  Generate PDF</button>
              {f.shapes&&f.shapes.length>0&&<button type="button" className="btn btn-o" onClick={handleExportKML}>📥  Export AOI KML</button>}
            </div>
            <div style={{borderTop:'1px solid #eef1ef',marginTop:16,paddingTop:14}}>
              <button type="button" className="btn btn-gh" onClick={reset}>🔄  Start New Form</button>
            </div>
          </Card>
        </>,
      ];

      return <div>
        {toast&&<div className={"toast "+(toast.t==="ok"?"ok":"err")}>{toast.m}</div>}

        <div className="hdr"><div className="hdr-in">
          <div className="brand">Kahuto Pacific Limited</div>
          <h1>Project Agreement, AOI Verification & Mobilisation Authorisation</h1>
          <div className="hdr-sub">Step {step+1} of {STEPS.length} — {STEPS[step]}</div>
          <div className="gold-rule"/>
        </div></div>

        <div className="tabs"><div className="tabs-in">
          {STEPS.map((l,i)=><button key={l} type="button" className={"tab"+(step===i?" on":"")} onClick={()=>setStep(i)}><span className="n">{i+1}</span>{l}</button>)}
        </div></div>

        <div className="wrap">{sc[step]()}</div>

        <div className="fnav"><div className="fnav-in">
          <button type="button" className="btn btn-gh" onClick={()=>setStep(Math.max(0,step-1))} disabled={step===0}>← Back</button>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,color:'#b5bfbc',fontWeight:500}}>{Math.round(progress)}% complete</span>
            {step<STEPS.length-1&&<button type="button" className="btn btn-p" onClick={()=>setStep(step+1)}>Next →</button>}
          </div>
        </div></div>
      </div>;
    }

    ReactDOM.render(<App/>,document.getElementById('root'));
  </script>
</body>
</html>
